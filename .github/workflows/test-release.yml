name: Test Release Build

on:
  push:
    branches: [ "main", "release-test*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          tar -czf dist/dz6-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release dz6
          
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          cd target/${{ matrix.target }}/release
          7z a ../../../dist/dz6-${{ matrix.target }}.zip dz6.exe
          cd ../../..
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dz6-${{ matrix.target }}
          path: dist/*
      
      - name: Test binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          ./target/${{ matrix.target }}/release/dz6 --version
      
      - name: Test binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          .\target\${{ matrix.target }}\release\dz6.exe --version
